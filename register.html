<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YukaStore | Daftar Akun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .auth-card {
            background: var(--bg-surface);
            border: var(--glass-border);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] .auth-card {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-secondary);
        }

        .auth-submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            margin-top: 1rem;
        }

        .auth-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
        }

        .auth-footer {
            margin-top: 2rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .auth-footer a {
            color: var(--text-primary);
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition-fast);
        }

        .auth-footer a:hover {
            color: var(--accent-color);
        }
    </style>
</head>

<body>
    <div class="floating-icons">
        <i class="ph ph-user-plus icon-1"></i>
        <i class="ph ph-identification-card icon-2"></i>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Buat Akun Baru</h2>
                <p>Daftar sekarang untuk mulai berbelanja di YukaStore.</p>
            </div>
            <form id="register-form">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="register-name" placeholder="Nama Anda" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="register-email" placeholder="contoh@email.com" required>
                </div>
                <div class="form-group">
                    <label>Kata Sandi</label>
                    <input type="password" id="register-password" placeholder="Buat kata sandi (min. 8 karakter)"
                        minlength="8" required>
                </div>
                <div class="form-group">
                    <label>Konfirmasi Sandi</label>
                    <input type="password" id="register-confirm" placeholder="Ulangi kata sandi" required>
                </div>
                <button type="submit" class="auth-submit-btn">Daftar Akun</button>
            </form>
            <div class="auth-footer">
                <p style="margin-bottom: 1rem;">Sudah punya akun? <a href="login.html">Masuk di sini</a></p>
                <a href="index.html" style="display: block;"><i class="ph ph-arrow-left"></i> Kembali ke Beranda</a>
            </div>
        </div>
    </div>

    <script src="transition.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', function (e) {
            e.preventDefault();

            const pass = document.getElementById('register-password').value;
            const confirmPass = document.getElementById('register-confirm').value;

            if (pass !== confirmPass) {
                alert('Konfirmasi kata sandi tidak cocok. Silakan periksa kembali.');
                return;
            }

            // Simulasi proses registrasi sederhana
            const btn = document.querySelector('.auth-submit-btn');
            btn.innerHTML = '<i class="ph ph-spinner ph-spin"></i> Memproses...';
            btn.style.pointerEvents = 'none';

            setTimeout(() => {
                // Anggap pendaftaran sekaligus login otomatis
                localStorage.setItem('yuka_logged_in', 'true');
                alert('Pendaftaran berhasil! Akun Anda telah aktif dan Anda otomatis masuk.');

                // Cek apakah keranjang ada isinya
                const cart = JSON.parse(localStorage.getItem('yuka_cart') || '[]');
                if (cart.length > 0) {
                    window.location.href = 'checkout.html'; // Langsung ke pembayaran jika ada keranjang
                } else {
                    window.location.href = 'store.html'; // Ke katalog jika kosong
                }
            }, 1000);
        });
    </script>
</body>

</html>
